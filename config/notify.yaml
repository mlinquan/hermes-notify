# Hermes notify configuration
# session_aliases: tmux session name (or /title) -> display name mapping
# Use Hermes /title command to give your session a stable name
session_aliases:
  my-agent: My Agent
  bot: Notification Bot

# Default sender name for notify-agent (when --from not specified)
default_sender: notify-agent

callbacks:
  - match_type: task_error
    priority: 1
    print: false
    context: true
    command: sh -c 'echo "Alert for type $TYPE"'

  - match_type: need_decision
    priority: 2
    print: false
    context: true
    command: sh -c 'echo "Alert for type $TYPE"'

  - match_type: plan_ready
    priority: 3
    print: false
    context: true
    command: sh -c 'echo "Alert for type $TYPE"'

  - match_type: task_done
    priority: 4
    print: false
    context: true
    command: sh -c 'echo "Alert for type $TYPE"'

  - match_type: task_start
    priority: 5
    print: false
    context: true

  - match_type: progress
    priority: 6
    print: false
    context: true

  - match_type: ack
    priority: 99
    print: true
    context: false
